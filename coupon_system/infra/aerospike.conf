service {
	cluster-name docker
}

logging {
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		address local
		port 3002
		interval 150
		timeout 10
	}

	fabric {
		address local
		port 3001
	}
}

namespace coupon_system {
	replication-factor 1
	default-ttl 0

	storage-engine memory {
		data-size 1G
	}
}
